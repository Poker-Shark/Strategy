<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Shark — Strategy War Room</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="auth-gate" id="authGate">
  <div class="auth-gate-card">
    <div class="auth-gate-logo">POKER SHARK</div>
    <div class="auth-gate-subtitle">Strategy War Room</div>
    <div class="auth-gate-form" id="authGateForm">
      <input type="email" class="mf-input" id="gateEmail" placeholder="Email">
      <input type="password" class="mf-input" id="gatePassword" placeholder="Password">
      <button class="briefing-cta" id="gateSignIn" style="margin-top:8px;max-width:none">SIGN IN</button>
      <div class="auth-gate-error" id="gateError"></div>
      <div style="font-size:10px;color:var(--text3);margin-top:12px">Authorized personnel only</div>
    </div>
  </div>
</div>

<div class="app-shell" id="appShell" style="display:none">
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">POKER SHARK</div>
    <div class="phase-tabs">
      <div class="phase-tab active" data-phase="draft">Draft</div>
      <div class="phase-tab" data-phase="laning">Laning</div>
      <div class="phase-tab" data-phase="mid">Mid Game</div>
      <div class="phase-tab" data-phase="late">Late Game</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="mode-toggle" id="modeToggle"></div>
    <div id="economySlot"></div>
    <div id="authSlot"></div>
  </div>
</div>

<div class="main">
  <div class="draft-panel" id="draftPanel"></div>

  <div class="map-wrap" id="mapWrap">
    <canvas id="mapTerrain"></canvas>
    <svg id="mapSvg" xmlns="http://www.w3.org/2000/svg"></svg>
    <canvas id="fogCanvas"></canvas>
    <div class="map-tooltip" id="tooltip"></div>
    <div class="minimap-wrap" id="minimapWrap">
      <canvas id="minimapCanvas" width="200" height="150"></canvas>
      <div class="minimap-viewport" id="minimapViewport"></div>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomIn">+</button>
      <span class="zoom-level" id="zoomLevel">2.0x</span>
      <button class="zoom-btn" id="zoomOut">-</button>
      <button class="zoom-btn" id="zoomReset" title="Reset zoom">1:1</button>
    </div>
  </div>

  <div class="intel-panel" id="intelPanel"></div>
</div>

<div class="shop-drawer" id="shopDrawer"></div>
<div class="task-drawer" id="taskDrawer"></div>
<div class="briefing-overlay" id="briefingOverlay"></div>

<div class="bottombar">
  <button class="btn" id="briefingBtn">Briefing <span class="key">G</span></button>
  <button class="btn" id="shopBtn">Shop <span class="key">B</span></button>
  <button class="btn" id="taskBtn">Tasks <span class="key">T</span></button>
  <button class="btn" id="fogBtn">Fog <span class="key">F</span></button>
  <button class="btn" id="fogEditBtn">Fog Edit <span class="key">E</span></button>
  <button class="btn" id="wardBtn">Place Ward <span class="key">W</span></button>
  <button class="btn" id="resetFogBtn">Reset Fog <span class="key">R</span></button>
  <div class="spacer"></div>
  <div class="status-text" id="phaseStatus">DRAFT PHASE — Team Incomplete</div>
  <div class="spacer"></div>
  <button class="btn" id="savesBtn">Saves</button>
  <button class="btn" id="screenshotBtn">Screenshot</button>
  <button class="btn" id="exportBtn">Export</button>
  <button class="btn" id="importBtn">Import</button>
</div>

</div><!-- end app-shell -->

<script type="module" src="/js/app.js"></script>
</body>
</html>
